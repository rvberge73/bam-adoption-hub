<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAM Adoption Hub | Power Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>BAM ADOPTION HUB</h1>
        </div>
        <nav>
            <div class="nav-item active" data-view="dashboard">📊 Dashboard</div>
            <div class="nav-item" data-view="workshops">📅 Workshops</div>
            <div class="nav-item" data-view="contacts">👥 Business CRM</div>
            <div class="nav-item" data-view="updates">📡 Update Radar</div>
        </nav>
    </aside>

    <main class="main-content">
        <!-- Dashboard View -->
        <section id="view-dashboard" class="view">
            <div class="header-row">
                <h2>Welkom bij de Adoption Hub</h2>
            </div>
            <div class="grid" id="stats-grid">
                <div class="card">
                    <div class="card-title">Geplande Workshops</div>
                    <div id="count-workshops" style="font-size: 2rem; font-weight: 700;">0</div>
                </div>
                <div class="card">
                    <div class="card-title">Business Contacten</div>
                    <div id="count-contacts" style="font-size: 2rem; font-weight: 700;">0</div>
                </div>
                <div class="card">
                    <div class="card-title">Nieuwe Updates</div>
                    <div id="count-updates" style="font-size: 2rem; font-weight: 700;">0</div>
                </div>
            </div>
        </section>

        <!-- Workshops View -->
        <section id="view-workshops" class="view hidden">
            <div class="header-row">
                <h2>Workshops & Sessies</h2>
                <button class="btn btn-primary" onclick="showModal('workshop-modal')">+ Nieuwe Sessie</button>
            </div>
            <div class="grid" id="workshops-grid"></div>
        </section>

        <!-- Contacts View -->
        <section id="view-contacts" class="view hidden">
            <div class="header-row">
                <h2>Business CRM (Champions)</h2>
                <button class="btn btn-primary" onclick="showModal('contact-modal')">+ Nieuw Contact</button>
            </div>
            <div class="grid" id="contacts-grid"></div>
        </section>

        <!-- Updates View -->
        <section id="view-updates" class="view hidden">
            <div class="header-row">
                <h2>Microsoft Update Radar</h2>
                <button class="btn btn-primary" onclick="showModal('update-modal')">+ Nieuwe Update</button>
            </div>
            <div class="grid" id="updates-grid"></div>
        </section>
    </main>

    <!-- Modals -->
    <div id="workshop-modal" class="modal">
        <div class="modal-content">
            <h3>Nieuwe Sessie Toevoegen</h3><br>
            <form id="workshop-form">
                <div class="form-group">
                    <label>Titel</label>
                    <input type="text" name="title" required>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select name="type">
                        <option value="Workshop">Workshop</option>
                        <option value="Demo">Demo</option>
                        <option value="Inloopspreekuur">Inloopspreekuur</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Datum & Tijd</label>
                    <input type="datetime-local" name="date" required>
                </div>
                <div class="form-group">
                    <label>Locatie</label>
                    <input type="text" name="location">
                </div>
                <button type="submit" class="btn btn-primary">Opslaan</button>
                <button type="button" class="btn" onclick="hideModal('workshop-modal')">Annuleren</button>
            </form>
        </div>
    </div>

    <!-- More modals can be added here -->

    <script src="app.js"></script>
</body>
</html>
